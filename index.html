<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6a4fb0">
  <meta name="description" content="P'tits Contes — des livres illustrés et audio pour les enfants de 5 à 10 ans.">
  <title>P'tits Contes 📖</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- ============ Bibliothèque ============ -->
  <header class="app-bar">
    <h1 class="app-title">📖 P'tits Contes</h1>
    <button id="installBtn" class="install-btn" hidden>Installer l'appli</button>
  </header>

  <main id="library" class="library">
    <p class="tagline">Choisis une histoire à lire ou à écouter&nbsp;!</p>

    <div class="age-filter" role="group" aria-label="Filtrer par âge">
      <button class="chip active" data-age="all">Tous les âges</button>
      <button class="chip" data-age="5">5–6 ans</button>
      <button class="chip" data-age="7">7–8 ans</button>
      <button class="chip" data-age="9">9–10 ans</button>
    </div>

    <div id="shelf" class="shelf" aria-live="polite"></div>
  </main>

  <!-- ============ Lecteur ============ -->
  <section id="reader" class="reader" hidden aria-label="Lecteur d'histoire">
    <div class="reader-bar">
      <button id="backBtn" class="round-btn" aria-label="Retour à la bibliothèque">← Livres</button>
      <span id="readerTitle" class="reader-title"></span>
      <div class="progress" aria-hidden="true"><span id="progressFill" class="progress-fill"></span></div>
    </div>

    <div class="page-view">
      <figure class="illustration" id="illustration"></figure>
      <div class="text-panel">
        <p id="pageText" class="page-text" tabindex="-1"></p>
      </div>
    </div>

    <div class="controls">
      <button id="prevBtn" class="nav-btn" aria-label="Page précédente">◀</button>

      <div class="audio-controls">
        <button id="readBtn" class="read-btn" aria-label="Lire l'histoire à voix haute">
          <span class="read-icon">🔊</span> <span id="readLabel">Lis-moi&nbsp;!</span>
        </button>
        <label class="speed">
          🐢
          <input id="speed" type="range" min="0.7" max="1.3" step="0.1" value="1" aria-label="Vitesse de lecture">
          🐇
        </label>
      </div>

      <button id="nextBtn" class="nav-btn" aria-label="Page suivante">▶</button>
    </div>

    <p id="pageCount" class="page-count"></p>
    <p id="ttsWarn" class="tts-warn" hidden>🔇 La lecture à voix haute n'est pas disponible sur cet appareil.</p>
  </section>

  <script src="js/stories.js"></script>
  <script src="js/illustrations.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
